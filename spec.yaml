id: mt_patrols

requirements:
  - name: ecoscope-workflows-core
    version: ">=0.22.17, <0.23.0"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  - name: ecoscope-workflows-ext-ecoscope
    version: ">=0.22.17, <0.23.0"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  - name: ecoscope-workflows-ext-custom
    version: ">=0.0.40, <0.1.0"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  - name: pydeck
    version: "0.0.2"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

rjsf-overrides:
  properties:
    persist_patrol_traj.properties.filetypes.default: ["parquet"]
    Generate Maps.properties.base_map_defs.properties.base_maps.default:
      - url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"
        opacity: 1

  uiSchema:
    Process Patrol Observations.filter_patrol_obs.filter_point_coords.items.ui:options.label: false

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:
  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Data Source
    id: smart_client_name
    task: set_smart_connection

  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: '%d %b %Y %H:%M:%S %Z'

  - name: Get Patrol Observations
    id: patrol_obs
    task: ecoscope_workflows_ext_ecoscope.tasks.io.get_patrol_observations_from_smart
    partial:
      client: ${{ workflow.smart_client_name.return }}
      time_range: ${{ workflow.time_range.return }}
      ca_uuid: ""
      language_uuid: ""

  # - name: Load Patrol Observations
  #   id: patrol_obs
  #   task: ecoscope_workflows_ext_custom.tasks.io.load_df
  #   partial:
  #     deserialize_json: false

  - name: Extract Timezone Selection
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  - name: Convert Patrol Observations to Timezone
    id: convert_patrols_to_user_timezone
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.patrol_obs.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns: ["fixtime"]

  - title: Process Patrol Observations
    type: task-group
    description: >-
      Process patrol observations by applying filters and column transformations.
    tasks:
      - name: Remove Column Prefix Extra
        id: drop_extra_prefix_obs
        task: drop_column_prefix
        partial:
          df: ${{ workflow.convert_patrols_to_user_timezone.return }}
          prefix: "extra__"
          duplicate_strategy: "suffix"

      - name: Filter Observation Relocations
        id: filter_patrol_obs
        task: apply_reloc_coord_filter
        partial:
          df: ${{ workflow.drop_extra_prefix_obs.return }}
          roi_gdf: null
          roi_name: null
          reset_index: false
          bounding_box:
            min_x: -180.0
            max_x: 180.0
            min_y: -90.0
            max_y: 90.0
          filter_point_coords:
            - {x: 180.0, y: 90.0}
            - {x: 0.0, y: 0.0}
            - {x: 1.0, y: 1.0}

      - name: Trajectory Segment Filter
        id: patrol_traj
        task: relocations_to_trajectory
        partial:
          relocations: ${{ workflow.filter_patrol_obs.return }}

      - name: Remove Column Prefix Extra
        id: drop_extra_prefix_traj
        task: drop_column_prefix
        partial:
          df: ${{ workflow.patrol_traj.return }}
          prefix: "extra__"
          duplicate_strategy: "suffix"

      - name: Internally Process Columns
        id: customize_columns_internally
        task: map_columns
        partial:
          df: ${{ workflow.drop_extra_prefix_traj.return }}
          rename_columns: {}
          drop_columns: ["id"]
          retain_columns: []
          raise_if_not_found: false

      - name: Add temporal index to Patrol Trajectories
        id: traj_add_temporal_index
        task: add_temporal_index
        partial:
          df: ${{ workflow.customize_columns_internally.return }}
          time_col: "segment_start"
          groupers:
            - index_name: "patrol_mandate"
          cast_to_datetime: true
          format: "mixed"

      - name: Patrol Traj Colormap
        id: traj_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.traj_add_temporal_index.return }}
          colormap: ["#FF9600", "#F23B0E", "#A100CB", "#F04564", "#03421A", "#3089FF", "#E26FFF", "#8C1700", "#002960", "#FFD000", "#B62879", "#680078", "#005A56", "#0056C7", "#331878", "#E76826"]
          input_column_name: "station"
          output_column_name: "patrol_traj_colormap"

  - name: Split Patrol Trajectories by Group
    id: split_patrol_traj_groups
    task: split_groups
    partial:
      df: ${{ workflow.traj_colormap.return }}
      groupers:
        - index_name: "patrol_mandate"

  - name: Persist Patrol Trajectories
    id: persist_patrol_traj
    task: persist_df_wrapper
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_prefix: "patrol_trajectories"
      sanitize: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_patrol_traj_groups.return }}
    skipif:
      conditions:
        - never

  - title: Generate Maps
    type: task-group
    description: >-
      Generate maps to visualize patrol trajectories.
    tasks:
      - name: "Set Patrol Map Title"
        id: set_patrol_map_title
        task: set_string_var
        partial:
          var: "Patrol Trajectories Map"

      - name: Base Maps
        id: base_map_defs
        task: set_base_maps

      - name: Rename Trajectory Columns for Display
        id: rename_traj_display_columns
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          raise_if_not_found: false
          rename_columns:
            segment_start: "Start Time"
            timespan_seconds: "Duration (s)"
            speed_kmhr: "Speed (kph)"
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_patrol_traj_groups.return }}

      - name: Create Trajectory Map Layers
        id: patrol_traj_map_layers
        task: create_polyline_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            get_width: 3
            width_units: "pixels"
            color_column: "patrol_traj_colormap"
          legend:
            label_column: "station"
            color_column: "patrol_traj_colormap"
          tooltip_columns: ["Start Time", "Duration (s)", "Speed (kph)"]
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.rename_traj_display_columns.return }}

      - name: Draw Ecomaps
        id: traj_ecomap
        task: draw_ecomap
        partial:
          title: null
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: "top-left"
          legend_style:
            placement: "bottom-right"
          static: false
          max_zoom: 20
        mapvalues:
          argnames: geo_layers
          argvalues: ${{ workflow.patrol_traj_map_layers.return }}

      - name: Persist Ecomaps
        id: traj_ecomap_html_urls
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: "patrol_map"
        mapvalues:
          argnames: text
          argvalues: ${{ workflow.traj_ecomap.return }}

  - title: Transport Summary
    type: task-group
    description: >-
      Summarize patrol data by transport type and generate a bar chart.
    tasks:
      - name: Summarize by Transport Type
        id: transport_summary
        task: summarize_df
        partial:
          df: ${{ workflow.customize_columns_internally.return }}
          groupby_cols: ["patrol_transport"]
          summary_params:
            - display_name: "Patrol Count"
              aggregator: nunique
              column: patrol_id
            - display_name: "Total Distance (km)"
              aggregator: sum
              column: dist_meters
              original_unit: "m"
              new_unit: "km"
            - display_name: "Total Duration (hours)"
              aggregator: sum
              column: timespan_seconds
              original_unit: "s"
              new_unit: "h"
              decimal_places: 1
          reset_index: false

      - name: Summarize by Station
        id: station_summary
        task: summarize_df
        partial:
          df: ${{ workflow.customize_columns_internally.return }}
          groupby_cols: ["station"]
          summary_params:
            - display_name: "Patrol Count"
              aggregator: nunique
              column: patrol_id
            - display_name: "Total Distance (km)"
              aggregator: sum
              column: dist_meters
              original_unit: "m"
              new_unit: "km"
            - display_name: "Total Duration (hours)"
              aggregator: sum
              column: timespan_seconds
              original_unit: "s"
              new_unit: "h"
              decimal_places: 1
          reset_index: true

      - name: Draw Station Bar Chart
        id: patrol_bar_chart
        task: draw_bar_chart
        partial:
          dataframe: ${{ workflow.station_summary.return }}
          category: "station"
          layout_kwargs: null
          bar_chart_configs:
            - label: "Total Distance (km)"
              column: "Total Distance (km)"
              agg_func: "sum"
              show_label: true
              style:
                marker_color: "#35b779"
            - label: "Total Duration (hours)"
              column: "Total Duration (hours)"
              agg_func: "sum"
              show_label: true
              style:
                marker_color: "#31688e"

      - name: Persist Bar Chart
        id: persist_bar_chart
        task: persist_text
        partial:
          text: ${{ workflow.patrol_bar_chart.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: "transport_bar_chart"

      - name: Persist Transport Summary
        id: persist_transport_summary
        task: persist_df_wrapper
        partial:
          df: ${{ workflow.transport_summary.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_prefix: "transport_summary"
          filetypes: ["csv"]
          sanitize: true
        skipif:
          conditions:
            - never

  - title: Mandate Summary
    type: task-group
    description: >-
      Summarize patrol data by mandate type.
    tasks:
      - name: Summarize by Mandate
        id: mandate_summary
        task: summarize_df
        partial:
          df: ${{ workflow.customize_columns_internally.return }}
          groupby_cols: ["patrol_mandate"]
          summary_params:
            - display_name: "Patrol Count"
              aggregator: nunique
              column: patrol_id
            - display_name: "Total Distance (km)"
              aggregator: sum
              column: dist_meters
              original_unit: "m"
              new_unit: "km"
            - display_name: "Total Duration (hours)"
              aggregator: sum
              column: timespan_seconds
              original_unit: "s"
              new_unit: "h"
              decimal_places: 1
          reset_index: false

      - name: Persist Mandate Summary
        id: persist_mandate_summary
        task: persist_df_wrapper
        partial:
          df: ${{ workflow.mandate_summary.return }}
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_prefix: "mandate_summary"
          filetypes: ["csv"]
          sanitize: true
        skipif:
          conditions:
            - never

  - title: Ranger Summary
    type: task-group
    description: >-
      Summarize ranger patrol activity by station.
    tasks:
      - name: Set Station Grouper
        id: station_groupers
        task: set_groupers
        partial:
          groupers:
            - index_name: "station"

      - name: Split by Station
        id: split_by_station
        task: split_groups
        partial:
          df: ${{ workflow.customize_columns_internally.return }}
          groupers: ${{ workflow.station_groupers.return }}

      - name: Summarize Rangers per Station
        id: ranger_summary
        task: summarize_df
        partial:
          groupby_cols: ["patrol_leader_name"]
          summary_params:
            - display_name: "Patrol Count"
              aggregator: nunique
              column: patrol_id
            - display_name: "Total Distance (km)"
              aggregator: sum
              column: dist_meters
              original_unit: "m"
              new_unit: "km"
            - display_name: "Total Duration (hours)"
              aggregator: sum
              column: timespan_seconds
              original_unit: "s"
              new_unit: "h"
              decimal_places: 1
          reset_index: false
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_by_station.return }}

      - name: Persist Ranger Summary
        id: persist_ranger_summary
        task: persist_df_wrapper
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_prefix: "ranger_summary"
          filetypes: ["csv"]
          sanitize: true
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.ranger_summary.return }}
        skipif:
          conditions:
            - never

  - name: Set Report Groupers
    id: report_groupers
    task: set_groupers
    partial:
      groupers:
        - index_name: "patrol_mandate"
        - index_name: "station"

  - name: Create Patrol Report
    id: create_patrol_report
    task: ecoscope_workflows_ext_custom.tasks.results.create_docx
    partial:
      context:
        items:
          - item_type: timerange
            key: report_date
            value: ${{ workflow.time_range.return }}
            format: "%b %Y"
          - item_type: image
            key: patrol_maps
            value: ${{ workflow.traj_ecomap_html_urls.return }}
            screenshot_config:
              wait_for_timeout: 0
          - item_type: image
            key: bar_chart
            value: ${{ workflow.persist_bar_chart.return }}
            screenshot_config:
              wait_for_timeout: 0
          - item_type: table
            key: transport_summary
            value: ${{ workflow.transport_summary.return }}
          - item_type: table
            key: mandate_summary
            value: ${{ workflow.mandate_summary.return }}
          - item_type: table
            key: ranger_summary
            value: ${{ workflow.ranger_summary.return }}
      groupers: ${{ workflow.report_groupers.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_prefix: mt_patrols_report
    skipif:
      conditions:
        - never

  - name: Create Dashboard
    id: patrol_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets: []
      groupers:
        - index_name: "patrol_mandate"
      time_range: ${{ workflow.time_range.return }}
